services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ayv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ayv}
      POSTGRES_DB: ${POSTGRES_DB:-ayv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ayv} -d ${POSTGRES_DB:-ayv}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
